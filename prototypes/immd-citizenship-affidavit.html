const FLOW = ['start', 'deponent-details', 'applicant-info', 'knowledge-statement', 'contact', 'check', 'declaration', 'confirmation', 'applicant-email', 'mda-email'];

const PAGES = {
  'start': () => `
    <div class="space-y-8">
      <h1 class="font-bold text-[3.5rem] leading-[1.15]">Citizenship Affidavit</h1>
      <p class="text-[1.25rem] leading-relaxed">Complete this affidavit if you are a third party attesting to an applicant\'s character and identity in support of their citizenship application.</p>
      <div class="space-y-4">
        <h2 class="font-bold text-[2rem]">What you will need</h2>
        <ul class="list-disc pl-6 space-y-2">
            <li class="text-[1.25rem]">Your national ID or passport</li>
            <li class="text-[1.25rem]">The applicant's full name and details</li>
            <li class="text-[1.25rem]">Details of how and how long you have known the applicant</li>
            <li class="text-[1.25rem]">A witness or justice of the peace may be required at signing</li>
        </ul>
      </div>
      ${GovBB.startBtn()}
    </div>`,
  'deponent-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your details (deponent)</h1>
      <div class="space-y-8">
        ${GovBB.textField('deponent-first-name', 'First name')}
        ${GovBB.textField('deponent-last-name', 'Last name')}
        ${GovBB.dateField('deponent-dob', 'Date of birth', 'For example, 27 03 1970')}
        ${GovBB.textField('deponent-nationality', 'Nationality')}
        ${GovBB.textField('deponent-occupation', 'Occupation')}
        ${GovBB.textField('deponent-address', 'Address')}
        ${GovBB.continueBtn()}
      </div>
    </form>`,
  'applicant-info': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">About the applicant</h1>
      <div class="space-y-8">
        ${GovBB.textField('applicant-full-name', 'Applicant full name', {hint: 'The person applying for citizenship'})}
        ${GovBB.selectField('deponent-relationship', 'What is your relationship to the applicant?', ['Friend', 'Colleague', 'Employer', 'Neighbour', 'Community member', 'Other'])}
        ${GovBB.textField('known-duration', 'How long have you known the applicant?', {hint: 'For example, 5 years'})}
        ${GovBB.continueBtn()}
      </div>
    </form>`,
  'knowledge-statement': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your knowledge of the applicant</h1>
      <div class="space-y-8">
        ${GovBB.radioGroup('personally-known', 'Is the applicant personally known to you?', ['Yes', 'No'])}
        ${GovBB.textareaField('acquaintance-details', 'Describe how you know the applicant', {hint: 'For example, we have worked together for 5 years at the same company', rows: 4})}
        ${GovBB.textareaField('character-statement', 'What can you say about the applicant\'s character?', {hint: 'For example, they are of good character and I have never known them to be in trouble with the law', rows: 4})}
        ${GovBB.continueBtn()}
      </div>
    </form>`,
  'contact': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Your contact details</h1>
      <div class="space-y-8">
        ${GovBB.telField('deponent-phone', 'Phone number', {hint: 'For example, 246-555-1234'})}
        ${GovBB.emailField('contact-email', 'Email address')}
        ${GovBB.continueBtn()}
      </div>
    </form>`,


  'check': () => {
    const D = GovBB.D;
    return `
    <div class="space-y-8">
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Check your answers before sending</h1>
      <div class="space-y-8">
        <dl class="divide-y divide-bb-grey-00 border-t border-bb-grey-00">
          {GovBB.checkRows ? GovBB.checkRows() : ""}
        </dl>
        ${GovBB.continueBtn('Continue to declaration')}
      </div>
    </div>`;
  },

  'declaration': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Declaration</h1>

          </button>
          <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer">I confirm that the information I have provided is true and correct.</label>
        </div>
        ${GovBB.continueBtn('Submit application')}
      </div>
    </form>`,

  'confirmation': () => `

      <div class="bg-bb-teal-00 text-bb-white-00 p-8 rounded-sm space-y-4">

            <div class="space-y-4">

      </div>
      ${GovBB.continueBtn('See emails sent')}
    </div>`,

  'applicant-email': () => {

    const ref = window.__refNumber || 'CAF-XXXXXX';

    const dd = String(today.getDate()).padStart(2,'0');
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const yyyy = today.getFullYear();
    const subDate = `${dd}/${mm}/${yyyy}`;
    return `
    <div class="space-y-6">
      ${GovBB.backLink()}
      <div class="eml-page-badge">&#9993; Applicant email &mdash; Citizenship Affidavit</div>
      <p class="eml-page-label">Email Templates / Applicant Emails</p>

                <li>Processing usually takes 8–12 weeks.</li>
                <li>You will be contacted if additional information is required.</li>
                <li>Keep your reference number safe for follow-up enquiries.</li>
              </ul>
            </div>
          </div>
          <div class="email-footer-bar">
            <div class="email-footer-text">
              <p>This is an automated confirmation email from the Government of Barbados.</p>
              <p>If you have any questions, please contact the Immigration Department and include your reference number: <strong>${ref}</strong></p>
              <p>Please do not reply to this email.</p>
            </div>
            <div class="email-footer-right">
              <img src="${_COAT}" alt="Coat of arms">
              <p class="email-footer-copy">&copy; 2025 Government of Barbados</p>
            </div>
          </div>
        </div>
      </div>
      ${GovBB.continueBtn('See MDA email')}
    </div>`;
  },

  'mda-email': () => {
    const D = GovBB.D;
    const ref = window.__refNumber || 'CAF-XXXXXX';
    const today = new Date();
    const dd = String(today.getDate()).padStart(2,'0');
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const yyyy = today.getFullYear();
    const hh = String(today.getHours()).padStart(2,'0');
    const min = String(today.getMinutes()).padStart(2,'0');
    const subDate = `${dd}/${mm}/${yyyy}`;
    const subTime = `${hh}:${min}`;
    const dr = (label, value) => `<div class="mda-data-row"><div class="mda-data-label">${label}</div><div class="mda-data-value">${value || '&mdash;'}</div></div>`;
    return `
    <div class="space-y-6">
      ${GovBB.backLink()}
      <div class="mda-page-badge">&#9993; MDA email &mdash; Citizenship Affidavit</div>
      <p class="eml-page-label">Email Templates / MDA Emails</p>
      <h1 class="eml-page-title">MDA Submission Email &mdash; Citizenship Affidavit</h1>
      <p class="eml-page-desc">Sent to the Immigration Department when a citizen submits the Citizenship Affidavit form.</p>
      <div style="background:#f2f4f6;padding:32px 0;">
        <div class="mda-email">
          <div class="mda-header">${_LOGO}</div>
          <div class="mda-content">
            <h1 class="mda-h1">You have received a Citizenship Affidavit submission</h1>
            <div class="mda-summary-table">
              <div class="mda-summary-row"><div class="mda-summary-label">Service:</div><div class="mda-summary-value">Citizenship Affidavit</div></div>
              <div class="mda-summary-row"><div class="mda-summary-label">Submission ID:</div><div class="mda-summary-value">${ref}</div></div>
              <div class="mda-summary-row"><div class="mda-summary-label">Submission date:</div><div class="mda-summary-value">${subDate}</div></div>
              <div class="mda-summary-row"><div class="mda-summary-label">Submission time:</div><div class="mda-summary-value">${subTime}</div></div>
              <div class="mda-summary-row"><div class="mda-summary-label">Applicant email:</div><div class="mda-summary-value">${D['contact-email'] || '&mdash;'}</div></div>
            </div>
            <p class="mda-intro">Here is the data from this submission:</p>
            <div class="mda-sections">
              <div>
                <p class="mda-section-h2">Deponent details</p>
                <div class="mda-data-table">
                  ${dr('Full name', [D['deponent-first-name'], D['deponent-last-name']].filter(Boolean).join(' '))}
                  ${dr('Date of birth', [D['deponent-dob-day'], D['deponent-dob-month'], D['deponent-dob-year']].filter(Boolean).join('/'))}
                  ${dr('Nationality', D['deponent-nationality'])}
                  ${dr('Occupation', D['deponent-occupation'])}
                  ${dr('Address', D['deponent-address'])}
                  ${dr('Phone', D['deponent-phone'])}
                  ${dr('Email', D['contact-email'])}
                </div>
              </div>
              <div>
                <p class="mda-section-h2">Relationship to applicant</p>
                <div class="mda-data-table">
                  ${dr('Applicant name', D['applicant-full-name'])}
                  ${dr('Relationship', D['deponent-relationship'])}
                  ${dr('How long known', D['known-duration'])}
                </div>
              </div>
              <div>
                <p class="mda-section-h2">Knowledge statement</p>
                <div class="mda-data-table">
                  ${dr('Personally known', D['personally-known'])}
                  ${dr('Acquaintance details', D['acquaintance-details'])}
                  ${dr('Character statement', D['character-statement'])}
                </div>
              </div>
              <div class="mda-internal-box">
                <p>Due date: <span class="fv">[To be filled by officer]</span></p>
                <p>Officer assigned: <span class="fv">[To be filled by officer]</span></p>
                <p>Reference: <span class="fv">[To be filled by officer]</span></p>
              </div>
            </div>
          </div>
          <div class="mda-footer">
            <div class="mda-footer-text">
              <p>This is an automated notification from the Government of Barbados.</p>
              <p>Please <strong>do not reply</strong> to this email.</p>
            </div>
            <div class="mda-footer-right">
              <img src="${_COAT}" alt="Coat of arms">
              <p class="mda-footer-copyright">&copy; 2025 Government of Barbados</p>
            </div>
          </div>
        </div>
      </div>
      <a href="../index.html" class="inline-flex outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00">Return to all forms</a>
    </div>`;
  }
};

function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'deponent-details') {
    if (!D['deponent-first-name']) errors.push({id:'deponent-first-name', msg:'First name – Enter your first name'});
    if (!D['deponent-last-name'])  errors.push({id:'deponent-last-name',  msg:'Last name – Enter your last name'});
    if (!D['deponent-nationality']) errors.push({id:'deponent-nationality', msg:'Nationality – Enter your nationality'});
  }
  if (pageId === 'applicant-info') {
    if (!D['applicant-full-name']) errors.push({id:'applicant-full-name', msg:'Applicant name – Enter the applicant full name'});
  }
  if (pageId === 'contact') {
    if (!D['contact-email']) errors.push({id:'contact-email', msg:'Email – Enter your email address'});
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
});
</script>
</body>
</html>
