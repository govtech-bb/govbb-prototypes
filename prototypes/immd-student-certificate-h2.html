          <div class="email-header-bar">${_LOGO}</div>
          <div class="email-content">
            <h1 class="email-h1">Application received</h1>
            <p class="email-greeting">Dear ${D['first-name'] || '[Name]'},</p>
            <p class="email-body">Thank you for submitting your Certificate by Non-Immigrant Student (Form H-2). We have received your application and will review it shortly.</p>
            <div class="ref-box">
              <p class="ref-number">Reference Number: ${ref}</p>
              <p class="ref-sub">Please keep this reference number for your records.</p>
            </div>
            <div class="next-section">
              <p class="next-heading">What happens next</p>
              <ul class="next-list">
                <li>Your Form H-2 Certificate has been received by the Immigration Department.</li>
                <li>Your school in Barbados will be notified of your application.</li>
                <li>Processing usually takes 5–10 working days.</li>
                <li>You will receive a confirmation letter once your certificate is issued.</li>
                <li>Keep your reference number safe in case you need to follow up.</li>
              </ul>
            </div>
          </div>
          <div class="email-footer-bar">
            <div class="email-footer-text">
              <p>This is an automated confirmation email from the Government of Barbados.</p>
              <p>If you have any questions, please contact the Immigration Department and include your reference number: <strong>${ref}</strong></p>
              <p>Please do not reply to this email.</p>
            </div>
            <div class="email-footer-right">
              <img src="${_COAT}" alt="Coat of arms">
              <p class="email-footer-copy">&copy; 2025 Government of Barbados</p>
            </div>
          </div>
        </div>
      </div>
      ${GovBB.continueBtn('See MDA email')}
    </div>`;
  },

  'mda-email': () => {
    const D = GovBB.D;
    const ref = window.__refNumber || 'CSH-XXXXXX';
    const today = new Date();
    const dd = String(today.getDate()).padStart(2,'0');
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const yyyy = today.getFullYear();
    const hh = String(today.getHours()).padStart(2,'0');
    const min = String(today.getMinutes()).padStart(2,'0');
    const subDate = `${dd}/${mm}/${yyyy}`;
    const subTime = `${hh}:${min}`;
    const dr = (label, value) => `<div class="mda-data-row"><div class="mda-data-label">${label}</div><div class="mda-data-value">${value || '&mdash;'}</div></div>`;
    return `
    <div class="space-y-6">
      ${GovBB.backLink()}
      <div class="mda-page-badge">&#9993; MDA email &mdash; Certificate by Non-Immigrant Student (Form H-2)</div>
      <p class="eml-page-label">Email Templates / MDA Emails</p>
      <h1 class="eml-page-title">MDA Submission Email &mdash; Certificate by Non-Immigrant Student (Form H-2)</h1>
      <p class="eml-page-desc">Sent to the Immigration Department when a citizen submits the Certificate by Non-Immigrant Student (Form H-2) form.</p>
      <div style="background:#f2f4f6;padding:32px 0;">
        <div class="mda-email">
          <div class="mda-header">${_LOGO}</div>
          <div class="mda-content">
            <h1 class="mda-h1">You have received a Certificate by Non-Immigrant Student (Form H-2) submission</h1>
            <div class="mda-summary-table">
              <div class="mda-summary-row"><div class="mda-summary-label">Service:</div><div class="mda-summary-value">Certificate by Non-Immigrant Student (Form H-2)</div></div>
              <div class="mda-summary-row"><div class="mda-summary-label">Submission ID:</div><div class="mda-summary-value">${ref}</div></div>
              <div class="mda-summary-row"><div class="mda-summary-label">Submission date:</div><div class="mda-summary-value">${subDate}</div></div>
              <div class="mda-summary-row"><div class="mda-summary-label">Submission time:</div><div class="mda-summary-value">${subTime}</div></div>
              <div class="mda-summary-row"><div class="mda-summary-label">Applicant email:</div><div class="mda-summary-value">${D['contact-email'] || '&mdash;'}</div></div>
            </div>
            <p class="mda-intro">Here is the data from this submission:</p>
            <div class="mda-sections">
              <div>
                <p class="mda-section-h2">Student details</p>
                <div class="mda-data-table">
                  ${dr('Full name', [D['first-name'], D['middle-name'], D['last-name']].filter(Boolean).join(' '))}
                  ${dr('Date of birth', [D['dob-day'], D['dob-month'], D['dob-year']].filter(Boolean).join('/'))}
                  ${dr('Nationality', D['nationality'])}
                  ${dr('Country of origin', D['country-of-origin'])}
                  ${dr('Passport number', D['passport-number'])}
                </div>
              </div>
              <div>
                <p class="mda-section-h2">School details</p>
                <div class="mda-data-table">
                  ${dr('School name', D['school-name'])}
                  ${dr('School address', D['school-address'])}
                  ${dr('Level of study', D['study-level'])}
                  ${dr('Course name', D['course-name'])}
                </div>
              </div>
              <div>
                <p class="mda-section-h2">Emergency contact (overseas)</p>
                <div class="mda-data-table">
                  ${dr('Name', D['emerg-name'])}
                  ${dr('Relationship', D['emerg-relationship'])}
                  ${dr('Phone', D['emerg-phone'])}
                  ${dr('Email', D['emerg-email'])}
                </div>
              </div>
              <div>
                <p class="mda-section-h2">Local contact</p>
                <div class="mda-data-table">
                  ${dr('Name', D['local-name'])}
                  ${dr('Relationship', D['local-relationship'])}
                  ${dr('Phone', D['local-phone'])}
                  ${dr('Email', D['contact-email'])}
                  ${dr('Address', D['local-address'])}
                </div>
              </div>
              <div class="mda-internal-box">
                <p>Due date: <span class="fv">[To be filled by officer]</span></p>
                <p>Officer assigned: <span class="fv">[To be filled by officer]</span></p>
                <p>Reference: <span class="fv">[To be filled by officer]</span></p>
              </div>
            </div>
          </div>
          <div class="mda-footer">
            <div class="mda-footer-text">
              <p>This is an automated notification from the Government of Barbados.</p>
              <p>Please <strong>do not reply</strong> to this email.</p>
            </div>
            <div class="mda-footer-right">
              <img src="${_COAT}" alt="Coat of arms">
              <p class="mda-footer-copyright">&copy; 2025 Government of Barbados</p>
            </div>
          </div>
        </div>
      </div>
      <a href="../index.html" class="inline-flex outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00">Return to all forms</a>
    </div>`;
  }
};

function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'student-name') {
    if (!D['first-name']) errors.push({id:'first-name', msg:'First name – Enter your first name'});
    if (!D['last-name'])  errors.push({id:'last-name',  msg:'Last name – Enter your last name'});
  }
  if (pageId === 'student-personal') {
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) errors.push({id:'dob-day', msg:'Date of birth – Enter your date of birth'});
    if (!D['nationality']) errors.push({id:'nationality', msg:'Nationality – Enter your nationality'});
    if (!D['passport-number']) errors.push({id:'passport-number', msg:'Passport number – Enter your passport number'});
  }
  if (pageId === 'school-details') {
    if (!D['school-name']) errors.push({id:'school-name', msg:'School name – Enter the name of your school'});
  }
  if (pageId === 'local-contact') {
    if (!D['contact-email']) errors.push({id:'contact-email', msg:'Email – Enter your local contact email address'});
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
});
</script>
</body>
</html>
