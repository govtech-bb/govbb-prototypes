const PAGES = {
  'application-type': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">What type of application is this?</h1>
      <div class="space-y-8">
        ${GovBB.radioGroup('application-type', 'Select the type of application', ['Short Term Work Permit', 'Training Attachment'])}
        ${GovBB.continueBtn()}
      </div>
    </form>`,
  'employer-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Employer details</h1>
      <div class="space-y-8">
        ${GovBB.textField('employer-name', 'Name of employer')}
        ${GovBB.continueBtn()}
      </div>
    </form>`,
  'employee-identity': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Employee or trainee identity</h1>
      <div class="space-y-8">
        ${GovBB.textField('employee-name', 'Full name of employee or trainee')}
        ${GovBB.textareaField('permanent-address', 'Permanent address of employee or trainee', {rows: 3})}
        ${GovBB.textareaField('local-address', 'Local residential address in Barbados', {hint: 'Leave blank if not currently in Barbados', rows: 3})}
        ${GovBB.continueBtn()}
      </div>
    </form>`,
  'personal-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Personal details of employee or trainee</h1>
      <div class="space-y-8">
        ${GovBB.dateField('dob', 'Date of birth', 'For example, 15 06 1990')}
        ${GovBB.radioGroup('sex', 'Sex', ['Male', 'Female', 'Prefer not to say'])}
        ${GovBB.radioGroup('marital-status', 'Marital status', ['Single', 'Married', 'Widowed', 'Divorced', 'Separated'])}
        ${GovBB.textField('nationality', 'Nationality')}
        ${GovBB.textField('previous-nationality', 'Previous nationality', {hint: 'Leave blank if not applicable'})}
        ${GovBB.textField('passport-number', 'Passport number')}
        ${GovBB.dateField('passport-issue-date', 'Passport date of issue', 'For example, 10 01 2020')}
        ${GovBB.textField('passport-issue-place', 'Passport place of issue')}
        ${GovBB.continueBtn()}
      </div>
    </form>`,
  'family-details': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Family details</h1>
      <div class="space-y-8">
        ${GovBB.textField('spouse-name', 'Full name of wife or husband', {hint: 'Leave blank if not married'})}
        ${GovBB.textField('spouse-nationality', 'Nationality of spouse', {hint: 'Leave blank if not married'})}
        ${GovBB.textField('child-1-name', 'First child — full name', {hint: 'Leave blank if no children'})}
        ${GovBB.dateField('child-1-dob', 'First child — date of birth', 'For example, 03 09 2010')}
        ${GovBB.textField('child-1-nationality', 'First child — nationality')}
        ${GovBB.continueBtn()}
      </div>
    </form>`,
  'job-description': () => `
    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">${GovBB.D['application-type'] === 'Training Attachment' ? 'Describe the training to be undertaken' : 'Describe the job to be undertaken'}</h1>
      <div class="space-y-8">

        ${GovBB.textareaField('experience', 'Relevant work experience', {hint: 'Include employer names, roles, dates and key responsibilities', rows: 4})}

      </div>

    <form novalidate>
      ${GovBB.backLink()}
      ${GovBB.caption()}
      
      <h1 class="font-bold text-[3.5rem] leading-[1.15] mb-8">Work experience</h1>

function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'application-type') {
    if (!D['application-type']) errors.push({id:'application-type', msg:'Application type – Select the type of application'});
  }
  if (pageId === 'employer-details') {
    if (!D['employer-name']) errors.push({id:'employer-name', msg:'Employer name – Enter the employer name'});
  }
  if (pageId === 'employee-identity') {
    if (!D['employee-name']) errors.push({id:'employee-name', msg:'Employee name – Enter the full name'});
    if (!D['permanent-address']) errors.push({id:'permanent-address', msg:'Permanent address – Enter the permanent address'});
  }
  if (pageId === 'personal-details') {
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) errors.push({id:'dob-day', msg:'Date of birth – Enter the date of birth'});
    if (!D['nationality']) errors.push({id:'nationality', msg:'Nationality – Enter the nationality'});
    if (!D['passport-number']) errors.push({id:'passport-number', msg:'Passport number – Enter the passport number'});
  }
  if (pageId === 'entry-details') {
    if (!D['entry-date-day'] || !D['entry-date-month'] || !D['entry-date-year']) errors.push({id:'entry-date-day', msg:'Entry date – Enter the proposed date of entry'});
    if (!D['duration-of-stay']) errors.push({id:'duration-of-stay', msg:'Duration – Enter the duration of stay'});
  }
  if (pageId === 'declaration') {
    if (!D['trainee-name']) errors.push({id:'trainee-name', msg:'Trainee name – Enter the trainee or employee name'});
    if (!D['employer-signatory']) errors.push({id:'employer-signatory', msg:'Employer name – Enter the employer signatory name'});
  }
  return errors;
}

GovBB.init({

  pages: PAGES,
  validate: validate,
});
