function getFlow() {
  const base = ['start', 'eligibility'];
  if (GovBB.D['owns-property'] === 'Yes') {
    base.push('disqualified');
    return base;
  }
  if (GovBB.D['is-citizen'] === 'No') {
    base.push('not-eligible');
    return base;
  }
  base.push('applicant-details');
  if (GovBB.D['co-applicant'] === 'Yes') base.push('co-applicant-details');
  base.push('criteria', 'preferences', 'household-income', 'financing', 'check', 'declaration', 'confirmation', 'applicant-email', 'mda-email');
  return base;
}

function validate(pageId) {
  const errors = [];
  if (pageId === 'eligibility') {
    if (!GovBB.D['owns-property']) errors.push({id: 'owns-property', msg: 'You must answer this question to continue'});
    if (!GovBB.D['is-citizen']) errors.push({id: 'is-citizen', msg: 'You must answer this question to continue'});
    if (!GovBB.D['co-applicant']) errors.push({id: 'co-applicant', msg: 'You must answer this question to continue'});
  }
  if (pageId === 'applicant-details') {
    if (!GovBB.D['title']) errors.push({id: 'title', msg: 'Title – Please select a title'});
    if (!GovBB.D['first-name']) errors.push({id: 'first-name', msg: 'First name – Enter your first name'});
    if (!GovBB.D['last-name']) errors.push({id: 'last-name', msg: 'Last name – Enter your last name'});
    if (!GovBB.D['nrn']) errors.push({id: 'nrn', msg: 'National Registration Number – Enter your NRN'});
    if (!GovBB.D['email']) errors.push({id: 'email', msg: 'Email – Enter your email address'});
  }
  if (pageId === 'declaration') {
    if (!GovBB.D['decl-agree']) errors.push({id: 'decl-agree', msg: 'You must confirm the declaration to submit'});
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: getFlow(),
  pages: PAGES,
  validate: validate,
  getFlow: getFlow
});
