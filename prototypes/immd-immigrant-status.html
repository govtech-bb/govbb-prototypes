function validate(pageId) {
  const D = GovBB.D;
  const errors = [];
  if (pageId === 'applicant-name') {
    if (!D['first-name']) errors.push({id:'first-name', msg:'First name – Enter your first name'});
    if (!D['last-name'])  errors.push({id:'last-name',  msg:'Last name – Enter your last name'});
  }
  if (pageId === 'personal-details') {
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) errors.push({id:'dob-day', msg:'Date of birth – Enter your date of birth'});
    if (!D['nationality']) errors.push({id:'nationality', msg:'Nationality – Enter your nationality'});
    if (!D['place-of-birth']) errors.push({id:'place-of-birth', msg:'Place of birth – Enter your place of birth'});
  }
  if (pageId === 'passport-details') {
    if (!D['passport-number']) errors.push({id:'passport-number', msg:'Passport number – Enter your passport number'});
  }
  if (pageId === 'barbados-address') {
    if (!D['address-line1']) errors.push({id:'address-line1', msg:'Address – Enter the first line of your address'});
    if (!D['parish']) errors.push({id:'parish', msg:'Parish – Select a parish'});
  }
  if (pageId === 'contact-details') {
    if (!D['contact-email']) errors.push({id:'contact-email', msg:'Email – Enter your email address'});
  }
  return errors;
}

GovBB.init({
  formName: FORM_NAME,
  flow: FLOW,
  pages: PAGES,
  validate: validate,
});
