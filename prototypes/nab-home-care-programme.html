/* ───────── Form-specific configuration ───────── */
const FORM_NAME = 'Application for Home Care Services';

/* ───────── Helper functions ───────── */
function formatDate(prefix) {
  const d = GovBB.D[prefix + '-day'];
  const m = GovBB.D[prefix + '-month'];
  const y = GovBB.D[prefix + '-year'];
  if (!d && !m && !y) return '—';
  return [d, m, y].filter(Boolean).join(' / ');
}

function checkboxItem(key, label) {
  const checked = GovBB.D[key];
  return `
    <div class="flex gap-5 items-center">
      <button type="button" role="checkbox" aria-checked="${checked ? 'true' : 'false'}"
        onclick="GovBB.toggleCheckbox('${key}'); GovBB.render();"
        class="relative inline-flex size-12 shrink-0 items-center justify-center bg-bb-white-00 border-2 border-bb-black-00 rounded-sm transition-all hover:cursor-pointer hover:shadow-form-hover focus-visible:ring-4 focus-visible:ring-bb-teal-100 outline-none">
        ${checked ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
      </button>
      <label class="text-[1.25rem] leading-normal text-bb-black-00 cursor-pointer"
             onclick="GovBB.toggleCheckbox('${key}'); GovBB.render();">${label}</label>
    </div>`;
}

function summarySection(title, rows) {
  const visibleRows = rows.filter(r => r !== null);
  if (!visibleRows.length) return '';
  return `
    <div class="space-y-4">
      <h2 class="font-bold text-[1.5rem] mt-8">${title}</h2>
      <dl class="divide-y divide-bb-grey-00 border-t border-b border-bb-grey-00">
        ${visibleRows.join('')}
      </dl>
    </div>`;
}

function checkboxSummary(keys) {
  const checked = keys.filter(([k]) => GovBB.D[k]).map(([, label]) => label);
  return checked.length ? checked.join(', ') : '—';
}

                <div class="mda-data-row"><div class="mda-data-label">Care plan notes</div><div class="mda-data-value">${GovBB.D['care-plan'] || '[Care plan]'}</div></div>
              </div>
            </div>
            <div>
              <h2 class="mda-section-h2">Declaration</h2>
              <p class="mda-declaration-text">I, ${GovBB.D['decl-first-name'] || '[First name]'} ${GovBB.D['decl-last-name'] || '[Last name]'}, declare that the information given is true and correct.</p>
              <div class="mda-data-table">
                <div class="mda-data-row"><div class="mda-data-label">Declarant name</div><div class="mda-data-value">${GovBB.D['decl-first-name'] || ''} ${GovBB.D['decl-last-name'] || '[Name]'}</div></div>
                <div class="mda-data-row"><div class="mda-data-label">Declarant email</div><div class="mda-data-value">${GovBB.D['decl-email'] || '[Email]'}</div></div>
                <div class="mda-data-row"><div class="mda-data-label">Agreed to declaration</div><div class="mda-data-value">${GovBB.D['decl-agree'] ? 'Yes' : 'No'}</div></div>
              </div>
            </div>
            <div class="mda-internal-box">
              <p>Due date: <span class="fv">[To be filled by officer]</span></p>
              <p>Social worker assigned: <span class="fv">[To be filled by officer]</span></p>
              <p>Notes: <span class="fv">[To be filled by officer]</span></p>
            </div>
          </div>
        </div>
        <div class="mda-footer">
          <div class="mda-footer-text">
            <p>This is an automated notification from the Government of Barbados digital services.</p>
            <p>Please <strong>do not reply</strong> to this email.</p>
          </div>
          <div class="mda-footer-right">
            <img src="${_COAT}" alt="Coat of arms of Barbados">
            <p class="mda-footer-copyright">&copy; 2025 Government of Barbados</p>
          </div>
        </div>
      </div>
      <div class="mt-8">
        <a href="../index.html" class="inline-flex outline-none underline-offset-2 underline hover:no-underline text-bb-teal-00 hover:text-bb-black-00 hover:bg-bb-teal-10 text-[1.25rem]">Return to home</a>
      </div>
    </div>`
};

/* ───────── Validation ───────── */
function validate(pageId) {
  const D = GovBB.D;
  const errors = [];

  if (pageId === 'recipient-name') {
    if (!D['first-name'] || !D['first-name'].trim()) errors.push({ id: 'first-name', msg: "First name – Enter the recipient's first name" });
    if (!D['last-name'] || !D['last-name'].trim()) errors.push({ id: 'last-name', msg: "Last name – Enter the recipient's last name" });
  }

  if (pageId === 'recipient-address') {
    if (!D['address'] || !D['address'].trim()) errors.push({ id: 'address', msg: "Home address – Enter the recipient's address" });
  }

  if (pageId === 'personal-details') {
    if (!D['dob-day'] || !D['dob-month'] || !D['dob-year']) {
      errors.push({ id: 'dob-day', msg: "Date of birth – Enter the recipient's date of birth" });
    }
    if (!D['gender']) errors.push({ id: 'gender', msg: 'Gender – Select a gender' });
  }

  if (pageId === 'contact-person') {
    if (!D['contact-name'] || !D['contact-name'].trim()) errors.push({ id: 'contact-name', msg: 'Contact person name – Enter the name of the contact person' });
  }

  if (pageId === 'income') {
    if (!D['application-date-day'] || !D['application-date-month'] || !D['application-date-year']) {
      errors.push({ id: 'application-date-day', msg: 'Date of application – Enter the date of application' });
    }
  }

  if (pageId === 'physical-condition') {
    const sightKeys = ['sight-normal','sight-visual-impairment','sight-blind','sight-spectacles'];
    if (!sightKeys.some(k => D[k])) {
      errors.push({ id: 'sight-error', msg: 'Sight – Select at least one option' });
      setTimeout(() => { const el = document.getElementById('sight-error'); if (el) el.classList.remove('hidden'); }, 50);
    }
    const hearingKeys = ['hearing-normal','hearing-impairment','hearing-deaf','hearing-speech'];
    if (!hearingKeys.some(k => D[k])) {
      errors.push({ id: 'hearing-error', msg: 'Hearing – Select at least one option' });
      setTimeout(() => { const el = document.getElementById('hearing-error'); if (el) el.classList.remove('hidden'); }, 50);
    }
  }

  if (pageId === 'mental-status') {
    const behavKeys = ['behaviour-normal','behaviour-abnormal','behaviour-other'];
    if (!behavKeys.some(k => D[k])) {
      errors.push({ id: 'behaviour-error', msg: 'Behaviour – Select at least one option' });
      setTimeout(() => { const el = document.getElementById('behaviour-error'); if (el) el.classList.remove('hidden'); }, 50);
    }
    const memKeys = ['memory-normal','memory-fair','memory-poor'];
    if (!memKeys.some(k => D[k])) {
      errors.push({ id: 'memory-error', msg: 'Memory – Select at least one option' });
      setTimeout(() => { const el = document.getElementById('memory-error'); if (el) el.classList.remove('hidden'); }, 50);
    }
  }

  if (pageId === 'physical-attributes') {
    if (!D['height']) errors.push({ id: 'height', msg: 'Height – Select a height' });
    if (!D['size']) errors.push({ id: 'size', msg: 'Size – Select a size' });
    if (!D['mobility']) errors.push({ id: 'mobility', msg: 'Mobility – Select a mobility option' });
    const illnessKeys = ['illness-hypertension','illness-diabetes','illness-arthritis','illness-heart','illness-visual','illness-healthy','illness-other'];
    if (!illnessKeys.some(k => D[k])) {
      errors.push({ id: 'illness-error', msg: 'Illnesses or conditions – Select at least one option' });
      setTimeout(() => { const el = document.getElementById('illness-error'); if (el) el.classList.remove('hidden'); }, 50);
    }
  }

  if (pageId === 'assistance') {
    const assistKeys = ['assist-cooking','assist-grooming','assist-cleaning','assist-debedding','assist-other'];
    if (!assistKeys.some(k => D[k])) {
      errors.push({ id: 'assistance-error', msg: 'Areas of assistance – Select at least one option' });
      setTimeout(() => { const el = document.getElementById('assistance-error'); if (el) el.classList.remove('hidden'); }, 50);
    }
    if (D['assist-other'] && (!D['assist-other-spec'] || !D['assist-other-spec'].trim())) {
      errors.push({ id: 'assist-other-spec', msg: 'Other assistance – Describe the other assistance needed' });
    }
  }

  if (pageId === 'declaration') {
    if (!D['decl-agree']) {
      errors.push({ id: 'agree-error', msg: 'Declaration – You must agree to the declaration to continue' });
      setTimeout(() => { const el = document.getElementById('agree-error'); if (el) el.classList.remove('hidden'); }, 50);
    }
    if (!D['decl-first-name'] || !D['decl-first-name'].trim()) errors.push({ id: 'decl-first-name', msg: 'First name – Enter your first name' });
    if (!D['decl-last-name'] || !D['decl-last-name'].trim()) errors.push({ id: 'decl-last-name', msg: 'Last name – Enter your last name' });
    if (!D['decl-email'] || !D['decl-email'].trim()) errors.push({ id: 'decl-email', msg: 'Email address – Enter your email address' });
  }

  return errors;
}

/* ───────── Init ───────── */
GovBB.init({
  formName: FORM_NAME,
  flow: ['start', 'recipient-name', 'recipient-address', 'personal-details', 'contact-person', 'contact-info', 'income', 'household', 'physical-condition', 'mental-status', 'physical-attributes', 'assistance', 'check', 'declaration', 'confirmation', 'applicant-email', 'mda-email'],
  pages: PAGES,
  validate: validate,
  onRadioChange: function(name, value) {
    if (name === 'assist-other' || name === 'height' || name === 'size' || name === 'mobility') {
      setTimeout(() => { GovBB.render(); }, 10);
    }
  }
});
</script>
</body>
